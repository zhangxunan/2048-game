<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #776e65;
            font-size: 48px;
            font-weight: bold;
        }

        .scores {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: #bbada0;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            min-width: 80px;
        }

        .score-label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .game-intro {
            color: #776e65;
            font-size: 16px;
        }

        .new-game-btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .new-game-btn:hover {
            background: #9f8b77;
            transform: translateY(-2px);
        }

        .game-board {
            background: #bbada0;
            border-radius: 10px;
            padding: 15px;
            position: relative;
            touch-action: none;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .grid-cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
            width: 100%;
            aspect-ratio: 1;
        }

        .tile-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            pointer-events: none;
        }

        .tile {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            border-radius: 6px;
            animation: appear 0.2s ease-in-out;
            transition: all 0.15s ease-in-out;
        }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes merge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .tile-merge {
            animation: merge 0.2s ease-in-out;
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 28px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 28px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 28px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 24px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 24px; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.4); }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 20px; }

        .game-message {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .game-message.active {
            opacity: 1;
            pointer-events: all;
        }

        .game-message p {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-message button {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .instructions {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #bbada0;
            color: #776e65;
            font-size: 14px;
            line-height: 1.6;
        }

        .instructions strong {
            color: #555;
        }

        @media (max-width: 500px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 36px;
            }

            .grid-container {
                gap: 8px;
            }

            .tile-container {
                gap: 8px;
            }

            .tile {
                font-size: 24px;
            }

            .tile-128, .tile-256, .tile-512 {
                font-size: 20px;
            }

            .tile-1024, .tile-2048 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <div class="scores">
                <div class="score-box">
                    <div class="score-label">得分</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="game-intro">合并数字达到 <strong>2048!</strong></div>
            <button class="new-game-btn" onclick="game.restart()">新游戏</button>
        </div>

        <div class="game-board" id="game-board">
            <div class="grid-container">
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div class="tile-container" id="tile-container"></div>
            <div class="game-message" id="game-message">
                <p id="message-text">游戏结束!</p>
                <button onclick="game.restart()">再玩一次</button>
            </div>
        </div>

        <div class="instructions">
            <strong>操作说明：</strong><br>
            💻 电脑：使用 <strong>方向键</strong> 或 <strong>WASD</strong> 移动方块<br>
            📱 手机：在棋盘上 <strong>滑动</strong> 来移动方块<br>
            <strong>规则：</strong> 相同数字的方块碰撞时会合并，目标是达到 2048!
        </div>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.size = 4;
                this.grid = [];
                this.score = 0;
                this.bestScore = parseInt(localStorage.getItem('bestScore2048')) || 0;
                this.gameOver = false;
                this.won = false;
                this.tileContainer = document.getElementById('tile-container');
                this.scoreElement = document.getElementById('score');
                this.bestScoreElement = document.getElementById('best-score');
                this.messageElement = document.getElementById('game-message');
                this.messageText = document.getElementById('message-text');
                
                this.touchStartX = 0;
                this.touchStartY = 0;
                
                this.init();
                this.setupInput();
            }

            init() {
                this.grid = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.score = 0;
                this.gameOver = false;
                this.won = false;
                this.messageElement.classList.remove('active');
                this.addRandomTile();
                this.addRandomTile();
                this.updateView();
            }

            restart() {
                this.init();
            }

            addRandomTile() {
                const emptyCells = [];
                for (let row = 0; row < this.size; row++) {
                    for (let col = 0; col < this.size; col++) {
                        if (this.grid[row][col] === 0) {
                            emptyCells.push({ row, col });
                        }
                    }
                }
                
                if (emptyCells.length > 0) {
                    const { row, col } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.grid[row][col] = Math.random() < 0.9 ? 2 : 4;
                }
            }

            updateView() {
                this.tileContainer.innerHTML = '';
                
                for (let row = 0; row < this.size; row++) {
                    for (let col = 0; col < this.size; col++) {
                        const value = this.grid[row][col];
                        if (value !== 0) {
                            const tile = document.createElement('div');
                            tile.className = `tile tile-${value <= 2048 ? value : 'super'}`;
                            tile.textContent = value;
                            tile.style.gridRow = row + 1;
                            tile.style.gridColumn = col + 1;
                            this.tileContainer.appendChild(tile);
                        }
                    }
                }

                this.scoreElement.textContent = this.score;
                this.bestScoreElement.textContent = this.bestScore;

                if (this.gameOver) {
                    this.messageText.textContent = this.won ? '你赢了!' : '游戏结束!';
                    this.messageElement.classList.add('active');
                }
            }

            move(direction) {
                if (this.gameOver) return;

                let moved = false;
                const newGrid = this.grid.map(row => [...row]);

                const rotate = (matrix) => {
                    const n = matrix.length;
                    const result = Array(n).fill(null).map(() => Array(n).fill(0));
                    for (let row = 0; row < n; row++) {
                        for (let col = 0; col < n; col++) {
                            result[col][n - 1 - row] = matrix[row][col];
                        }
                    }
                    return result;
                };

                const rotateBack = (matrix) => {
                    const n = matrix.length;
                    const result = Array(n).fill(null).map(() => Array(n).fill(0));
                    for (let row = 0; row < n; row++) {
                        for (let col = 0; col < n; col++) {
                            result[n - 1 - col][row] = matrix[row][col];
                        }
                    }
                    return result;
                };

                const mergeLeft = (row) => {
                    let arr = row.filter(val => val !== 0);
                    let merged = [];
                    let scoreGain = 0;
                    
                    for (let i = 0; i < arr.length; i++) {
                        if (i < arr.length - 1 && arr[i] === arr[i + 1]) {
                            merged.push(arr[i] * 2);
                            scoreGain += arr[i] * 2;
                            i++;
                        } else {
                            merged.push(arr[i]);
                        }
                    }
                    
                    while (merged.length < this.size) {
                        merged.push(0);
                    }
                    
                    return { merged, scoreGain };
                };

                let rotations = 0;
                if (direction === 'right') rotations = 2;
                else if (direction === 'up') rotations = 3;
                else if (direction === 'down') rotations = 1;

                for (let i = 0; i < rotations; i++) {
                    for (let row = 0; row < this.size; row++) {
                        newGrid[row] = newGrid[row].map((_, col) => newGrid[this.size - 1 - col][row]);
                    }
                }

                for (let row = 0; row < this.size; row++) {
                    const { merged, scoreGain } = mergeLeft(newGrid[row]);
                    if (merged.join(',') !== newGrid[row].join(',')) {
                        moved = true;
                    }
                    newGrid[row] = merged;
                    this.score += scoreGain;
                }

                for (let i = 0; i < (4 - rotations) % 4; i++) {
                    for (let row = 0; row < this.size; row++) {
                        newGrid[row] = newGrid[row].map((_, col) => newGrid[this.size - 1 - col][row]);
                    }
                }

                if (moved) {
                    this.grid = newGrid;
                    this.addRandomTile();
                    
                    if (this.score > this.bestScore) {
                        this.bestScore = this.score;
                        localStorage.setItem('bestScore2048', this.bestScore);
                    }

                    if (this.checkWin()) {
                        this.won = true;
                        this.gameOver = true;
                    } else if (this.checkGameOver()) {
                        this.gameOver = true;
                    }

                    this.updateView();
                }
            }

            checkWin() {
                for (let row = 0; row < this.size; row++) {
                    for (let col = 0; col < this.size; col++) {
                        if (this.grid[row][col] === 2048) {
                            return true;
                        }
                    }
                }
                return false;
            }

            checkGameOver() {
                for (let row = 0; row < this.size; row++) {
                    for (let col = 0; col < this.size; col++) {
                        if (this.grid[row][col] === 0) return false;
                        
                        if (col < this.size - 1 && this.grid[row][col] === this.grid[row][col + 1]) {
                            return false;
                        }
                        if (row < this.size - 1 && this.grid[row][col] === this.grid[row + 1][col]) {
                            return false;
                        }
                    }
                }
                return true;
            }

            setupInput() {
                document.addEventListener('keydown', (e) => {
                    const keyMap = {
                        'ArrowUp': 'up', 'ArrowDown': 'down',
                        'ArrowLeft': 'left', 'ArrowRight': 'right',
                        'w': 'up', 'W': 'up',
                        's': 'down', 'S': 'down',
                        'a': 'left', 'A': 'left',
                        'd': 'right', 'D': 'right'
                    };

                    if (keyMap[e.key]) {
                        e.preventDefault();
                        this.move(keyMap[e.key]);
                    }
                });

                const gameBoard = document.getElementById('game-board');
                
                gameBoard.addEventListener('touchstart', (e) => {
                    this.touchStartX = e.touches[0].clientX;
                    this.touchStartY = e.touches[0].clientY;
                }, { passive: true });

                gameBoard.addEventListener('touchend', (e) => {
                    if (!this.touchStartX || !this.touchStartY) return;

                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;

                    const diffX = touchEndX - this.touchStartX;
                    const diffY = touchEndY - this.touchStartY;

                    const minSwipe = 30;

                    if (Math.abs(diffX) > Math.abs(diffY)) {
                        if (Math.abs(diffX) > minSwipe) {
                            if (diffX > 0) {
                                this.move('right');
                            } else {
                                this.move('left');
                            }
                        }
                    } else {
                        if (Math.abs(diffY) > minSwipe) {
                            if (diffY > 0) {
                                this.move('down');
                            } else {
                                this.move('up');
                            }
                        }
                    }

                    this.touchStartX = 0;
                    this.touchStartY = 0;
                }, { passive: true });

                gameBoard.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                }, { passive: false });
            }
        }

        const game = new Game2048();
    </script>
</body>
</html>
